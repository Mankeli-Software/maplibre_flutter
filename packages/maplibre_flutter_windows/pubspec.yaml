name: maplibre_flutter_windows
description: >-
  The Windows implementation of maplibre_flutter (mbgl-core via maplibre_flutter_core, ANGLE/GPU-surface texture).
version: 0.0.2
repository: https://github.com/Mankeli-Software/maplibre_flutter

environment:
  sdk: ^3.12.2
  flutter: ">=3.41.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  maplibre_flutter_platform_interface: ^0.0.2
  maplibre_flutter_core: ^0.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: maplibre_flutter
    platforms:
      windows:
        # Hybrid (dartPluginClass + pluginClass): the Dart class registers the
        # implementation; the native C++ plugin owns the texture registrar bridge
        # (CLAUDE.md §3). Windows renders mbgl-core via maplibre_flutter_core's
        # ANGLE/OpenGL-ES + EGL arm and presents through a PixelBufferTexture.
        dartPluginClass: MapLibreFlutterWindows
        pluginClass: MaplibreFlutterWindowsPlugin
