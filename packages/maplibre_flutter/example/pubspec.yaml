name: maplibre_flutter_example
description: "Demonstrates how to use the maplibre_flutter package."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  maplibre_flutter:
    path: ../
  cupertino_icons: ^1.0.8
  # Web: stops taps on the controls drawn over the map from leaking through to
  # the maplibre-gl-js DOM element. No-op on non-web platforms.
  pointer_interceptor: ^0.10.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
