org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# newDsl/builtInKotlin escape hatches are Flutter-managed (the tool re-adds them
# on build). They are app-level only — the maplibre_flutter_android module does
# NOT apply kotlin-android and builds whether or not these are set, so it stays
# §9-compliant for the AGP 10 end-state regardless (CLAUDE.md §9).
android.newDsl=false
android.builtInKotlin=false
