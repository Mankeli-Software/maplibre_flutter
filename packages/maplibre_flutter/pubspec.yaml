name: maplibre_flutter
description: >-
  Native MapLibre vector maps for Flutter on every platform — Android, iOS,
  macOS, Windows, Linux, and Web — with true native rendering on desktop.
version: 0.0.2
repository: https://github.com/JTorkk/maplibre_flutter

environment:
  sdk: ^3.12.2
  flutter: ">=3.41.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  maplibre_flutter_platform_interface: ^0.0.2
  # Endorsed default implementations. App users get these transitively and
  # never depend on a platform package directly.
  maplibre_flutter_android: ^0.0.2
  maplibre_flutter_ios: ^0.0.2
  maplibre_flutter_macos: ^0.0.2
  maplibre_flutter_windows: ^0.0.2
  maplibre_flutter_linux: ^0.0.2
  maplibre_flutter_web: ^0.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        default_package: maplibre_flutter_android
      ios:
        default_package: maplibre_flutter_ios
      macos:
        default_package: maplibre_flutter_macos
      windows:
        default_package: maplibre_flutter_windows
      linux:
        default_package: maplibre_flutter_linux
      web:
        default_package: maplibre_flutter_web
