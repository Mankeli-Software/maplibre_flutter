name: maplibre_flutter_android
description: >-
  The Android implementation of maplibre_flutter (jnigen over the Kotlin MapLibre SDK, AndroidView).
version: 0.0.2
repository: https://github.com/Mankeli-Software/maplibre_flutter

environment:
  sdk: ^3.12.2
  flutter: ">=3.41.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  maplibre_flutter_platform_interface: ^0.0.2
  # jnigen control layer (CLAUDE.md §5a): Dart drives the native MapLibre map
  # over JNI, not method channels.
  jni: ^1.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  # Generator for lib/src/*_bindings.g.dart (committed, regenerated via tool/).
  jnigen: ^0.16.0

flutter:
  plugin:
    implements: maplibre_flutter
    platforms:
      android:
        # Hybrid (dartPluginClass + pluginClass): the Dart class registers the
        # implementation; the native plugin registers the AndroidView factory
        # with the platform-view registrar (CLAUDE.md §3).
        dartPluginClass: MapLibreFlutterAndroid
        pluginClass: MaplibreFlutterAndroidPlugin
        package: dev.maplibreflutter.maplibre_flutter_android
