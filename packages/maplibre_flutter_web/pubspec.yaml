name: maplibre_flutter_web
description: >-
  The Web implementation of maplibre_flutter (maplibre-gl-js via dart:js_interop, HtmlElementView).
version: 0.0.2
repository: https://github.com/Mankeli-Software/maplibre_flutter

environment:
  sdk: ^3.12.2
  flutter: ">=3.41.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  maplibre_flutter_platform_interface: ^0.0.2
  # DOM bindings for dart:js_interop (replaces dart:html, WASM-safe). The
  # interop with maplibre-gl-js itself uses dart:js_interop / dart:ui_web, which
  # ship with the SDK and need no dependency (CLAUDE.md §5).
  web: ^1.1.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: maplibre_flutter
    platforms:
      web:
        # Web's registrant is a Dart class (not dartPluginClass): its
        # registerWith takes a flutter_web_plugins Registrar. maplibre-gl-js /
        # HtmlElementView wiring lands in this platform's build-order step.
        pluginClass: MapLibreFlutterWeb
        fileName: maplibre_flutter_web.dart
