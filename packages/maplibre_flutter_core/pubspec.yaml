name: maplibre_flutter_core
description: >-
  Shared desktop core for maplibre_flutter: a thin C ABI shim over MapLibre
  Native (mbgl-core) plus the ffigen bindings used by the macOS, Windows, and
  Linux implementation packages.
version: 0.0.2
repository: https://github.com/JTorkk/maplibre_flutter

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  native_toolchain_c: ^0.17.4

dev_dependencies:
  ffi: ^2.1.4
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  test: ^1.28.0
