name: maplibre_flutter_core
description: >-
  Shared desktop core for maplibre_flutter: a thin C ABI shim over MapLibre
  Native (mbgl-core) plus the ffigen bindings used by the macOS, Windows, and
  Linux implementation packages.
version: 0.0.2
repository: https://github.com/Mankeli-Software/maplibre_flutter

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  # Runtime: the FFI wrapper in lib/ uses package:ffi (malloc/Arena/Utf8).
  ffi: ^2.1.4
  # Build hook (hook/build.dart): CMake build of mbgl-core + the C shim.
  # native_toolchain_cmake 0.2.5 pins hooks/code_assets <2.0.0, matching the
  # workspace's hooks ^1.0.0 resolution (CLAUDE.md §6 single-resolution pin).
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  native_toolchain_cmake: ^0.2.5

dev_dependencies:
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  test: ^1.28.0
